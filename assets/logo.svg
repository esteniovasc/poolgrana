<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Fundo: Quadrado Arredondado (Representando o Board/Piscina) -->
    <rect width="64" height="64" rx="16" fill="#2c3e50"/>
    
    <!-- Barra de Lucro/Entrada (Verde - Crescimento) -->
    <rect x="12" y="14" width="40" height="10" rx="4" fill="#27ae60"/>
    
    <!-- Barra de Futuro/Projeção (Azul - Equilíbrio/Planejamento) -->
    <rect x="20" y="28" width="32" height="10" rx="4" fill="#3498db"/>
    
    <!-- Barra de Despesa/Gasto (Vermelho - Controle) -->
    <rect x="28" y="42" width="24" height="10" rx="4" fill="#c0392b"/>

    <!-- Detalhe sutil: Linhas de fluxo/conectoras (opcional, mantendo simples para favicon) -->
</svg>

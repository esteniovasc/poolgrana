<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Poolgrana</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
</head>

<body>

	<div id="top-bar">
		<h1 style="display: flex; gap: 1vh;">
			<img src="assets/logo.svg" style="width: 4vh;" alt="Poolgrana Logo" class="app-logo">
			Poolgrana
		</h1>
		<div class="input-wrapper">
			<input type="text" id="cmd-input" placeholder="Digite: 'Netflix -50' ou 'Salário +3000'..." autofocus>
		</div>

		<!-- Ações de Arquivo -->
		<div id="file-actions">
			<button id="btn-save" title="Salvar Projeto (Download JSON)">💾 Salvar</button>
			<button id="btn-load" title="Abrir Projeto (Carregar JSON)">📂 Abrir</button>
			<input type="file" id="file-input" style="display: none;" accept=".json">
		</div>

		<div id="status-bar">
			<div class="status-item">
				<span class="status-label" id="current-month-label">MÊS ATUAL</span>
				<div class="status-values">
					<strong id="current-month-balance" class="value-positive">R$ 0,00</strong>
				</div>
			</div>
			<div class="status-separator"></div>
			<div class="status-item">
				<span class="status-label">GASTOS FIXOS (MÊS)</span>
				<strong id="current-month-fixed-expenses" class="value-negative">R$ 0,00</strong>
			</div>
			<div class="status-separator"></div>
			<div class="status-item">
				<span class="status-label">ACUMULADO (VISÍVEL)</span>
				<strong id="future-balance">R$ 0,00</strong>
			</div>
		</div>
	</div>

	<!-- Container Principal com Scroll Vertical (Global da Página, se necessário) -->
	<main id="main-container">

		<!-- WRAPPER DE SCROLL HORIZONTAL UNIFICADO -->
		<div id="board-wrapper">

			<!-- SEÇÃO 1: TIMELINE FIXA (SWIMLANES) -->
			<!-- Cabeçalho das Colunas (Meses) - Sticky Top -->
			<div id="timeline-header">
				<!-- Injetado via JS -->
			</div>

			<div id="fixed-timeline">
				<!-- Grid injetado via JS -->
			</div>

			<!-- SEPARADOR VISUAL -->
			<div class="separator-line"></div>

			<!-- SEÇÃO 2: FLUXO VARIÁVEL (KANBAN) -->
			<div id="variable-board">
				<!-- Colunas independentes injetadas via JS -->
			</div>

		</div>

	</main>


	<!-- MODAL DE EDIÇÃO -->
	<dialog id="edit-modal">
		<form id="edit-form" method="dialog">
			<h3>Editar Transação</h3>

			<div class="form-group">
				<label for="edit-desc">Descrição</label>
				<input type="text" id="edit-desc" required>
			</div>

			<div class="form-group">
				<label for="edit-value">Valor (R$)</label>
				<input type="number" id="edit-value" step="0.01" required>
			</div>

			<div class="form-group">
				<label for="edit-date">Data</label>
				<input type="date" id="edit-date" required>
			</div>

			<div class="form-group">
				<label for="edit-type">Tipo</label>
				<select id="edit-type">
					<option value="variable">Variável</option>
					<option value="fixed">Fixo / Parcelado</option>
				</select>
			</div>

			<div class="modal-actions">
				<button type="button" id="btn-delete" class="btn-danger">Excluir</button>
				<div class="right-actions">
					<button type="button" id="btn-cancel">Cancelar</button>
					<button type="submit" id="btn-save" class="btn-primary">Salvar</button>
				</div>
			</div>
		</form>
	</dialog>

	<!-- MODAL DE LINHA DO TEMPO (DIÁRIO) -->
	<dialog id="timeline-modal" class="modal-large">
		<div class="timeline-header-container">
			<button type="button" id="tl-btn-prev" class="tl-nav-btn">◀</button>
			<div class="tl-title-group">
				<h3 id="tl-month-title">Mês</h3>
				<span class="tl-start-balance-label" id="tl-start-balance-container" style="display:none;">Saldo
					Herdado: <strong id="tl-start-balance">R$ 0,00</strong></span>
			</div>

			<div class="tl-actions-group">
				<label class="switch-container">
					<input type="checkbox" id="tl-toggle-carryover">
					<span class="slider round"></span>
				</label>
				<span class="switch-label">Somar Saldo Anterior</span>
				<button type="button" id="tl-btn-next" class="tl-nav-btn">▶</button>
			</div>
			<button type="button" id="tl-btn-close" class="btn-close">×</button>
		</div>
		<div id="timeline-content" class="timeline-container">
			<!-- Injetado via JS -->
		</div>
	</dialog>

	<script type="module" src="app.js"></script>
</body>

</html>
